---
openapi: 3.1.0
components:
  schemas:
    AccesTokenRepresentationRecord:
      type: object
      properties:
        token:
          type: string
        creationDateSeconds:
          type: integer
          format: int64
        expireDateSeconds:
          type: integer
          format: int64
        userId:
          type: string
        userKey:
          type: string
    AnalyticCurve:
      allOf:
      - $ref: "#/components/schemas/Curve"
      required:
      - type
      properties:
        type:
          type: string
          default: AnalyticCurve
        expX:
          $ref: "#/components/schemas/Expression"
        expY:
          $ref: "#/components/schemas/Expression"
        expZ:
          $ref: "#/components/schemas/Expression"
        offset:
          $ref: "#/components/schemas/Coordinate"
        analyticOffset:
          $ref: "#/components/schemas/Coordinate"
        defaultNumSamples:
          type: integer
          format: int32
        segmentCount:
          type: integer
          format: int32
        valid:
          type: boolean
      type: object
    AnnotatedFunctionDTO:
      type: object
      properties:
        functionName:
          type: string
        functionExpression:
          type: string
        error:
          type: string
        domain:
          $ref: "#/components/schemas/Domain"
        functionType:
          $ref: "#/components/schemas/VariableType"
        category:
          $ref: "#/components/schemas/FunctionCategory"
    Application:
      type: object
    ApplicationInfo:
      type: object
      properties:
        name:
          type: string
        type:
          $ref: "#/components/schemas/MathType"
        dimensions:
          type: integer
          format: int32
        geometryName:
          type: string
    BatchSystemType:
      type: string
      enum:
      - PBS
      - SGE
      - SLURM
    BioModel:
      type: object
      properties:
        bmKey:
          type: string
        name:
          type: string
        privacy:
          type: integer
          format: int32
        versionFlag:
          type: integer
          format: int32
        groupUsers:
          type: array
          items:
            type: string
        savedDate:
          type: integer
          format: int64
        annot:
          type: string
        branchID:
          type: string
        physModelKey:
          type: string
        ownerName:
          type: string
        ownerKey:
          type: string
        simulationKeyList:
          type: array
          items:
            $ref: "#/components/schemas/KeyValue"
        applications:
          type: array
          items:
            $ref: "#/components/schemas/Application"
    BioModelChildSummary:
      type: object
      properties:
        scNames:
          type: array
          items:
            type: string
        scAnnots:
          type: array
          items:
            type: string
        geoNames:
          type: array
          items:
            type: string
        geoDims:
          type: array
          items:
            type: integer
            format: int32
        appTypes:
          type: array
          items:
            $ref: "#/components/schemas/MathType"
        simNames:
          type: array
          items:
            type: array
            items:
              type: string
        simAnnots:
          type: array
          items:
            type: array
            items:
              type: string
        geometryDimensions:
          type: array
          items:
            type: integer
            format: int32
        geometryNames:
          type: array
          items:
            type: string
        simulationContextAnnotations:
          type: array
          items:
            type: string
        simulationContextNames:
          type: array
          items:
            type: string
        applicationInfo:
          type: array
          items:
            $ref: "#/components/schemas/ApplicationInfo"
    BioModelSummary:
      type: object
      properties:
        version:
          $ref: "#/components/schemas/Version"
        summary:
          $ref: "#/components/schemas/BioModelChildSummary"
        publicationInformation:
          type: array
          items:
            $ref: "#/components/schemas/PublicationInfo"
        vCellSoftwareVersion:
          $ref: "#/components/schemas/VCellSoftwareVersion"
    BiomodelRef:
      type: object
      properties:
        bmKey:
          type: integer
          format: int64
        name:
          type: string
        ownerName:
          type: string
        ownerKey:
          type: integer
          format: int64
        versionFlag:
          type: integer
          format: int32
        privacy:
          type: integer
          format: int32
    CompositeCurve:
      allOf:
      - $ref: "#/components/schemas/Curve"
      required:
      - type
      properties:
        type:
          type: string
          default: CompositeCurve
        fieldCurves:
          type: array
          items: {}
        curveCount:
          type: integer
          format: int32
        defaultNumSamples:
          type: integer
          format: int32
        segmentCount:
          type: integer
          format: int32
        valid:
          type: boolean
      type: object
    ControlPointCurve:
      allOf:
      - $ref: "#/components/schemas/Curve"
      required:
      - type
      discriminator:
        propertyName: type
        mapping:
          Spline: "#/components/schemas/Spline"
          SampledCurve: "#/components/schemas/SampledCurve"
      properties:
        type:
          type: string
          default: ControlPointCurve
        controlPoints:
          type: array
          items:
            $ref: "#/components/schemas/Coordinate"
        controlPointCount:
          type: integer
          format: int32
        controlPointsVector:
          type: array
          items:
            $ref: "#/components/schemas/Coordinate"
        maxControlPoints:
          type: integer
          format: int32
        minControlPoints:
          type: integer
          format: int32
        controlPointAddable:
          type: boolean
        valid:
          type: boolean
      type: object
    Coordinate:
      type: object
      properties:
        x:
          type: number
          format: double
        "y":
          type: number
          format: double
        z:
          type: number
          format: double
    Curve:
      required:
      - type
      discriminator:
        propertyName: type
        mapping:
          AnalyticCurve: "#/components/schemas/AnalyticCurve"
          CompositeCurve: "#/components/schemas/CompositeCurve"
          ControlPointCurve: "#/components/schemas/ControlPointCurve"
      type: object
      properties:
        bClosed:
          type: boolean
        description:
          type: string
        type:
          type: string
        beginningCoordinate:
          $ref: "#/components/schemas/Coordinate"
        defaultNumSamples:
          type: integer
          format: int32
        endingCoordinate:
          $ref: "#/components/schemas/Coordinate"
        numSamplePoints:
          type: integer
          format: int32
        segmentCount:
          type: integer
          format: int32
        spatialLength:
          type: number
          format: double
        closed:
          type: boolean
        valid:
          type: boolean
    CurveSelectionInfo:
      type: object
      properties:
        fieldCurve:
          $ref: "#/components/schemas/Curve"
        fieldType:
          type: integer
          format: int32
        fieldControlPoint:
          type: integer
          format: int32
        fieldSegment:
          type: integer
          format: int32
        fieldU:
          type: number
          format: double
        fieldUExtended:
          type: number
          format: double
        fieldControlPointExtended:
          type: integer
          format: int32
        fieldSegmentExtended:
          type: integer
          format: int32
        fieldDirectionNegative:
          type: boolean
        crossing:
          type: boolean
    DataIdentifier:
      type: object
      properties:
        name:
          type: string
        displayName:
          type: string
        variableType:
          $ref: "#/components/schemas/VariableType"
        domain:
          $ref: "#/components/schemas/Domain"
        bFunction:
          type: boolean
        function:
          type: boolean
        visible:
          type: boolean
    Date:
      type: string
      format: date
      examples:
      - 2022-03-10
    DetailedState:
      type: string
      enum:
      - UNKNOWN
      - DATAMOVEREVENT_MOVED
      - WORKEREVENT_WORKERALIVE
      - JOB_WAITING
      - JOB_QUEUED
      - JOB_QUEUED_RETRY
      - JOB_DISPATCHED
      - JOB_ACCEPTED
      - SOLVER_READY
      - SOLVER_STARTING_INIT
      - SOLVEREVENT_STARTING_PROC_GEOM
      - SOLVEREVENT_STARTING_RESAMPLE_FD
      - SOLVER_RUNNING_INIT
      - SOLVER_RUNNING_INIT_INPUT_FILE
      - SOLVER_RUNNING_INIT_CODEGEN
      - SOLVER_RUNNING_INIT_COMPILING
      - SOLVER_RUNNING_INIT_COMPILECMD
      - SOLVER_RUNNING_INIT_COMPILE_OK
      - SOLVER_RUNNING_INIT_LINKING
      - SOLVER_RUNNING_INIT_LINKCMD
      - SOLVER_RUNNING_INIT_LINK_OK
      - SOLVER_RUNNING_INIT_COMPILELINK_OK
      - SOLVEREVENT_STARTING_INIT
      - SOLVEREVENT_STARTING_CODEGEN
      - SOLVEREVENT_STARTING_COMPILELINK
      - SOLVEREVENT_STARTING_INPUT_FILE
      - SOLVEREVENT_STARTING
      - SOLVEREVENT_STARTING_SUBMITTING
      - SOLVEREVENT_STARTING_SUBMITTED
      - WORKEREVENT_STARTING
      - SOLVEREVENT_RUNNING_START
      - SOLVER_RUNNING_START
      - JOB_RUNNING_UNKNOWN
      - SOLVEREVENT_PRINTED
      - WORKEREVENT_DATA
      - JOB_RUNNING
      - SOLVEREVENT_PROGRESS
      - WORKEREVENT_PROGRESS
      - WORKEREVENT_WORKEREXIT_NORMAL
      - WORKEREVENT_WORKEREXIT_ERROR
      - SOLVEREVENT_FINISHED
      - SOLVER_FINISHED
      - WORKEREVENT_COMPLETED
      - JOB_COMPLETED
      - SOLVER_STOPPED
      - JOB_STOPPED
      - JOB_FAILED_UNKNOWN
      - SOLVER_ABORTED
      - WORKEREVENT_FAILURE
      - JOB_FAILED
    Domain:
      type: object
      properties:
        name:
          type: string
    ExportEvent:
      type: object
      properties:
        eventType:
          $ref: "#/components/schemas/ExportProgressType"
        progress:
          type: number
          format: double
        format:
          type: string
        location:
          type: string
        user:
          $ref: "#/components/schemas/User"
        jobID:
          type: integer
          format: int64
        dataKey:
          $ref: "#/components/schemas/KeyValue"
        dataIdString:
          type: string
        humanReadableData:
          $ref: "#/components/schemas/HumanReadableExportData"
    ExportProgressType:
      type: string
      enum:
      - EXPORT_START
      - EXPORT_COMPLETE
      - EXPORT_FAILURE
      - EXPORT_ASSEMBLING
      - EXPORT_PROGRESS
    ExportableDataType:
      type: string
      enum:
      - ODE_VARIABLE_DATA
      - PDE_VARIABLE_DATA
      - PDE_PARTICLE_DATA
    Expression:
      type: string
    Extent:
      type: object
      properties:
        x:
          type: number
          format: double
          xml:
            attribute: true
        "y":
          type: number
          format: double
          xml:
            attribute: true
        z:
          type: number
          format: double
          xml:
            attribute: true
    ExternalDataIdentifier:
      type: object
      properties:
        key:
          $ref: "#/components/schemas/KeyValue"
        owner:
          $ref: "#/components/schemas/User"
        name:
          type: string
        jobIndex:
          type: integer
          format: int32
        simulationKey:
          $ref: "#/components/schemas/KeyValue"
        parameterScanType:
          type: boolean
        dataKey:
          $ref: "#/components/schemas/KeyValue"
    FieldData:
      type: object
      properties:
        shortSpecData:
          type: array
          items:
            type: array
            items:
              type: array
              items:
                type: integer
                format: int16
        doubleSpecData:
          type: array
          items:
            type: array
            items:
              type: array
              items:
                type: number
                format: double
        varNames:
          type: array
          items:
            type: string
        times:
          type: array
          items:
            type: number
            format: double
        origin:
          $ref: "#/components/schemas/Origin"
        extent:
          $ref: "#/components/schemas/Extent"
        isize:
          $ref: "#/components/schemas/ISize"
        annotation:
          type: string
        name:
          type: string
    FieldDataReference:
      type: object
      properties:
        fieldDataID:
          $ref: "#/components/schemas/ExternalDataIdentifier"
        annotation:
          type: string
        simulationsReferencingThisID:
          type: array
          items:
            $ref: "#/components/schemas/KeyValue"
    FieldDataSavedResults:
      type: object
      properties:
        fieldDataName:
          type: string
        fieldDataKey:
          type: string
    FieldDataShape:
      type: object
      properties:
        extent:
          $ref: "#/components/schemas/Extent"
        origin:
          $ref: "#/components/schemas/Origin"
        isize:
          $ref: "#/components/schemas/ISize"
        dataIdentifier:
          type: array
          items:
            $ref: "#/components/schemas/DataIdentifier"
        times:
          type: array
          items:
            type: number
            format: double
    FunctionCategory:
      type: string
      enum:
      - PREDEFINED
      - OLDUSERDEFINED
      - OUTPUTFUNCTION
      - POSTPROCESSFUNCTION
    GIFImage:
      type: object
      properties:
        gifEncodedData:
          type: string
          format: binary
        size:
          $ref: "#/components/schemas/ISize"
    GeometryMode:
      type: string
      enum:
      - GEOMETRY_SELECTIONS
      - GEOMETRY_SLICE
      - GEOMETRY_FULL
    GeometrySpecDTO:
      type: object
      properties:
        selections:
          type: array
          items:
            $ref: "#/components/schemas/SpatialSelection"
        axis:
          type: integer
          format: int32
        sliceNumber:
          type: integer
          format: int32
        geometryMode:
          $ref: "#/components/schemas/GeometryMode"
    GeometrySummary:
      type: object
      properties:
        dimension:
          type: integer
          format: int32
        origin:
          $ref: "#/components/schemas/Origin"
        extent:
          $ref: "#/components/schemas/Extent"
        imageRef:
          $ref: "#/components/schemas/KeyValue"
        version:
          $ref: "#/components/schemas/Version"
        softwareVersion:
          $ref: "#/components/schemas/VCellSoftwareVersion"
    GroupAccess:
      required:
      - groupid
      discriminator:
        propertyName: type
        mapping:
          GroupAccessNone: "#/components/schemas/GroupAccessNone"
          GroupAccessSome: "#/components/schemas/GroupAccessSome"
          GroupAccessAll: "#/components/schemas/GroupAccessAll"
      type: object
      properties:
        groupid:
          type: number
        description:
          type: string
    GroupAccessAll:
      allOf:
      - $ref: "#/components/schemas/GroupAccess"
      required:
      - type
      properties:
        type:
          type: string
          default: GroupAccessAll
        description:
          type: string
      type: object
    GroupAccessNone:
      allOf:
      - $ref: "#/components/schemas/GroupAccess"
      required:
      - type
      properties:
        type:
          type: string
          default: GroupAccessNone
        description:
          type: string
      type: object
    GroupAccessSome:
      allOf:
      - $ref: "#/components/schemas/GroupAccess"
      required:
      - type
      properties:
        type:
          type: string
          default: GroupAccessSome
        hash:
          type: number
        groupMembers:
          type: array
          items:
            $ref: "#/components/schemas/User"
        hiddenMembers:
          type: array
          items:
            type: boolean
        description:
          type: string
        hiddenGroupMembers:
          type: array
          items:
            $ref: "#/components/schemas/User"
        normalGroupMembers:
          type: array
          items:
            $ref: "#/components/schemas/User"
      type: object
    HelloWorldMessage:
      type: object
      properties:
        message:
          type: string
    HtcJobID:
      type: object
      properties:
        jobNumber:
          type: integer
          format: int64
        server:
          type: string
        batchSystemType:
          $ref: "#/components/schemas/BatchSystemType"
    HumanReadableExportData:
      type: object
      properties:
        simulationName:
          type: string
        biomodelName:
          type: string
        applicationName:
          type: string
        differentParameterValues:
          type: array
          items:
            type: string
        applicationType:
          type: string
        serverSavedFileName:
          type: string
        nonSpatial:
          type: boolean
        subVolume:
          type: object
          additionalProperties:
            type: string
        zSlices:
          type: integer
          format: int32
        tSlices:
          type: integer
          format: int32
        numChannels:
          type: integer
          format: int32
    ISize:
      type: object
      properties:
        x:
          type: integer
          format: int32
        "y":
          type: integer
          format: int32
        z:
          type: integer
          format: int32
    Identity:
      type: object
      properties:
        principal_name:
          type: string
        roles:
          type: array
          items:
            type: string
        attributes:
          type: array
          items:
            type: string
        credentials:
          type: array
          items:
            type: string
    Instant:
      type: string
      format: date-time
      examples:
      - 2022-03-10T16:15:50Z
    KeyValue:
      type: string
    MathModelChildSummary:
      type: object
      properties:
        modelType:
          $ref: "#/components/schemas/MathType"
        geometryDimension:
          type: integer
          format: int32
        geometryName:
          type: string
        simulationAnnotations:
          type: array
          items:
            type: string
        simulationNames:
          type: array
          items:
            type: string
    MathModelSummary:
      type: object
      properties:
        version:
          $ref: "#/components/schemas/Version"
        keyValue:
          $ref: "#/components/schemas/KeyValue"
        modelInfo:
          $ref: "#/components/schemas/MathModelChildSummary"
        softwareVersion:
          $ref: "#/components/schemas/VCellSoftwareVersion"
        publicationInfos:
          type: array
          items:
            $ref: "#/components/schemas/PublicationInfo"
        annotatedFunctions:
          type: string
    MathType:
      type: string
      enum:
      - RuleBased
      - Stochastic
      - Deterministic
      - SpringSaLaD
      - Unknown
    MathmodelRef:
      type: object
      properties:
        mmKey:
          type: integer
          format: int64
        name:
          type: string
        ownerName:
          type: string
        ownerKey:
          type: integer
          format: int64
        versionFlag:
          type: integer
          format: int32
    ModelType:
      type: string
      enum:
      - BIOMODEL
      - MATHMODEL
    N5ExportRequest:
      type: object
      properties:
        standardExportInformation:
          $ref: "#/components/schemas/StandardExportInfo"
        subVolume:
          type: object
          additionalProperties:
            type: string
        exportableDataType:
          $ref: "#/components/schemas/ExportableDataType"
        datasetName:
          type: string
    Origin:
      type: object
      properties:
        x:
          type: number
          format: double
          xml:
            attribute: true
        "y":
          type: number
          format: double
          xml:
            attribute: true
        z:
          type: number
          format: double
          xml:
            attribute: true
    Publication:
      type: object
      properties:
        pubKey:
          type: integer
          format: int64
        title:
          type: string
        authors:
          type: array
          items:
            type: string
        year:
          type: integer
          format: int32
        citation:
          type: string
        pubmedid:
          type: string
        doi:
          type: string
        endnoteid:
          type: integer
          format: int32
        url:
          type: string
        wittid:
          type: integer
          format: int32
        biomodelRefs:
          type: array
          items:
            $ref: "#/components/schemas/BiomodelRef"
        mathmodelRefs:
          type: array
          items:
            $ref: "#/components/schemas/MathmodelRef"
        date:
          $ref: "#/components/schemas/Date"
    PublicationInfo:
      type: object
      properties:
        publicationKey:
          $ref: "#/components/schemas/KeyValue"
        versionKey:
          $ref: "#/components/schemas/KeyValue"
        title:
          type: string
        authors:
          type: array
          items:
            type: string
        citation:
          type: string
        pubmedid:
          type: string
        doi:
          type: string
        url:
          type: string
        pubdate:
          $ref: "#/components/schemas/Date"
        vcDocumentType:
          $ref: "#/components/schemas/VCDocumentType"
        user:
          $ref: "#/components/schemas/User"
        theHashCode:
          type: integer
          format: int32
    PublishModelsRequest:
      type: object
      properties:
        biomodelKeys:
          type: array
          items:
            type: integer
            format: int64
        mathmodelKeys:
          type: array
          items:
            type: integer
            format: int64
    SPECIAL_CLAIM:
      type: string
      enum:
      - admins
      - powerUsers
      - publicationEditors
      - vcellSupport
    SampledCurve:
      allOf:
      - $ref: "#/components/schemas/ControlPointCurve"
      required:
      - type
      properties:
        type:
          type: string
          default: SampledCurve
        defaultNumSamples:
          type: integer
          format: int32
        maxControlPoints:
          type: integer
          format: int32
        minControlPoints:
          type: integer
          format: int32
        segmentCount:
          type: integer
          format: int32
        spatialLength:
          type: number
          format: double
      type: object
    SchedulerStatus:
      type: string
      enum:
      - WAITING
      - QUEUED
      - DISPATCHED
      - RUNNING
      - COMPLETED
      - STOPPED
      - FAILED
    SimulationExecutionStatusRecord:
      type: object
      properties:
        fieldStartDate:
          $ref: "#/components/schemas/Instant"
        fieldLatestUpdateDate:
          $ref: "#/components/schemas/Instant"
        fieldEndDate:
          $ref: "#/components/schemas/Instant"
        fieldComputeHost:
          type: string
        fieldHasData:
          type: boolean
        fieldHtcJobID:
          $ref: "#/components/schemas/HtcJobID"
    SimulationJobStatusRecord:
      type: object
      properties:
        fieldTimeDataStamp:
          $ref: "#/components/schemas/Instant"
        fieldVCSimID:
          $ref: "#/components/schemas/VCSimulationIdentifier"
        fieldSubmitDate:
          $ref: "#/components/schemas/Instant"
        fieldSchedulerStatus:
          $ref: "#/components/schemas/SchedulerStatus"
        fieldSimulationMessage:
          $ref: "#/components/schemas/SimulationMessage"
        fieldTaskID:
          type: integer
          format: int32
        fieldServerID:
          type: string
        fieldJobIndex:
          type: integer
          format: int32
        fieldSimulationExecutionStatus:
          $ref: "#/components/schemas/SimulationExecutionStatusRecord"
        fieldSimulationQueueEntryStatus:
          $ref: "#/components/schemas/SimulationQueueEntryStatusRecord"
    SimulationMessage:
      type: object
      properties:
        detailedState:
          $ref: "#/components/schemas/DetailedState"
        message:
          type: string
        htcJobId:
          $ref: "#/components/schemas/HtcJobID"
        displayMessage:
          type: string
    SimulationQueueEntryStatusRecord:
      type: object
      properties:
        fieldQueuePriority:
          type: integer
          format: int32
        fieldQueueDate:
          $ref: "#/components/schemas/Instant"
        fieldQueueID:
          $ref: "#/components/schemas/SimulationQueueID"
    SimulationQueueID:
      type: string
      enum:
      - QUEUE_ID_WAITING
      - QUEUE_ID_SIMULATIONJOB
      - QUEUE_ID_NULL
    SimulationStatusPersistentRecord:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/Status"
        details:
          type: string
        hasData:
          type: boolean
    SourceModel:
      type: object
      properties:
        modelID:
          type: string
        modelType:
          $ref: "#/components/schemas/ModelType"
    SpatialSelection:
      required:
      - type
      discriminator:
        propertyName: type
        mapping:
          Membrane: "#/components/schemas/SpatialSelectionMembrane"
          Contour: "#/components/schemas/SpatialSelectionContour"
          Volume: "#/components/schemas/SpatialSelectionVolume"
      type: object
      properties:
        curveSelectionInfo:
          $ref: "#/components/schemas/CurveSelectionInfo"
        varType:
          $ref: "#/components/schemas/VariableType"
        type:
          type: string
        smallestMeshCellDimensionLength:
          type: number
          format: double
        variableType:
