              schema:
                $ref: "#/components/schemas/VCellHTTPError"
      tags:
      - Publication Resource
      security:
      - openId:
        - user
  /api/v1/solver/getFVSolverInput:
    post:
      summary: Retrieve finite volume input from SBML spatial model.
      operationId: getFVSolverInputFromSBML
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                sbmlFile:
                  type: string
                  format: binary
                duration:
                  type: number
                  format: double
                  default: 5.0
                output_time_step:
                  type: number
                  format: double
                  default: 0.1
        required: true
      responses:
        "200":
          description: OK
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "422":
          description: Unprocessable content submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VCellHTTPError"
      tags:
      - Solver Resource
  /api/v1/solver/getFVSolverInputFromVCML:
    post:
      summary: Retrieve finite volume input from SBML spatial model.
      operationId: getFVSolverInputFromVCML
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                vcmlFile:
                  type: string
                  format: binary
                simulation_name:
                  type: string
        required: true
      responses:
        "200":
          description: OK
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "422":
          description: Unprocessable content submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VCellHTTPError"
      tags:
      - Solver Resource
  /api/v1/users/bearerToken:
    post:
      summary: Get token for legacy API
      operationId: getLegacyApiToken
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccesTokenRepresentationRecord"
        "401":
          description: Not Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VCellHTTPError"
        "403":
          description: Not Allowed
        "500":
          description: Data Access Exception
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VCellHTTPError"
      tags:
      - Users Resource
      security:
      - openId:
        - user
  /api/v1/users/forgotLegacyPassword:
    post:
      summary: "The end user has forgotten the legacy password they used for VCell,\
        \ so they will be emailed it."
      operationId: forgotLegacyPassword
      parameters:
      - name: userID
        in: query
        schema:
          type: string
      responses:
        "200":
          description: Legacy password sent in email
        "401":
          description: Need to login to Auth0
        "403":
          description: Not Allowed
        "500":
          description: Internal Error
      tags:
      - Users Resource
      security:
      - openId:
        - user
  /api/v1/users/guestBearerToken:
    post:
      summary: Method to get legacy tokens for guest users
      operationId: getGuestLegacyApiToken
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccesTokenRepresentationRecord"
        "500":
          description: Data Access Exception
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VCellHTTPError"
      tags:
      - Users Resource
  /api/v1/users/mapUser:
    post:
      summary: map vcell user
      operationId: mapUser
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserLoginInfoForMapping"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: boolean
        "400":
          description: Bad Request
        "401":
          description: Not Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VCellHTTPError"
        "403":
          description: Not Allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VCellHTTPError"
        "500":
          description: Data Access Exception
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VCellHTTPError"
      tags:
      - Users Resource
      security:
      - openId:
        - user
  /api/v1/users/mappedUser:
    get:
      summary: Get mapped VCell identity
      operationId: getMappedUser
      responses:
        "200":
          description: "Successful, returning the identity"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserIdentityJSONSafe"
        "401":
          description: Not Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VCellHTTPError"
        "403":
          description: Not Allowed
        "409":
          description: Conflict with server state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VCellHTTPError"
        "500":
          description: Data Access Exception
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VCellHTTPError"
      tags:
      - Users Resource
      security:
      - openId:
        - user
  /api/v1/users/me:
    get:
      summary: Get current user
      operationId: getMe
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Identity"
      tags:
      - Users Resource
  /api/v1/users/newUser:
    post:
      summary: create vcell user
      operationId: mapNewUser
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRegistrationInfo"
        required: true
      responses:
        "200":
          description: "Successful, returning the identity"
        "400":
          description: Bad Request
        "401":
          description: Not Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VCellHTTPError"
        "403":
          description: Not Allowed
        "409":
          description: "VCell Identity not mapped, userid already exists"
        "500":
          description: Data Access Exception
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VCellHTTPError"
      tags:
      - Users Resource
      security:
      - openId:
        - user
  /api/v1/users/processMagicLink:
    get:
      summary: Process the magic link and map the user
      operationId: processMagicLink
      parameters:
      - name: magic
        in: query
        schema:
          type: string
      responses:
        "200":
          description: User mapped successfully
        "400":
          description: Invalid or expired magic link
        "401":
          description: Not Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VCellHTTPError"
        "500":
          description: Data Access Exception
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VCellHTTPError"
      tags:
      - Users Resource
  /api/v1/users/requestRecoveryEmail:
    post:
      summary: request a recovery email to link a VCell account.
      operationId: requestRecoveryEmail
      parameters:
      - name: email
        in: query
        schema:
          type: string
      - name: userID
        in: query
        schema:
          type: string
      responses:
        "200":
          description: magic link sent in email if appropriate
        "400":
          description: unable to process request
        "401":
          description: Not Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VCellHTTPError"
        "403":
          description: Not Allowed
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VCellHTTPError"
        "500":
          description: Data Access Exception
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VCellHTTPError"
      tags:
      - Users Resource
      security:
      - openId:
        - user
  /api/v1/users/unmapUser/{userName}:
    put:
      summary: remove vcell identity mapping
      operationId: unmapUser
      parameters:
      - name: userName
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: boolean
        "401":
          description: Not Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VCellHTTPError"
        "403":
          description: Not Allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VCellHTTPError"
        "500":
          description: Data Access Exception
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VCellHTTPError"
      tags:
      - Users Resource
      security:
      - openId:
        - user
